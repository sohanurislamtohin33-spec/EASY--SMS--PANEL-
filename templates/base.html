<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EASY SMS PANEL{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: #08090c; color: #cbd5e1; margin: 0; padding: 0; }
        .navbar { background-color: #0f111a; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
        .nav-left-box { display: flex; align-items: center; gap: 15px; }
        .brand { font-size: 18px; font-weight: bold; color: #38bdf8; }
        .menu-toggle { font-size: 20px; cursor: pointer; color: #cbd5e1; }
        .user-balance-badge { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid #3b82f6; color: #38bdf8; padding: 6px 14px; border-radius: 20px; font-weight: bold; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background-color: #0f111a; border-right: 1px solid #1e293b; z-index: 9999; transition: left 0.3s ease; display: flex; flex-direction: column; }
        .sidebar.open { left: 0; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .close-sidebar { font-size: 20px; cursor: pointer; color: #94a3b8; }
        .sidebar-menu { display: flex; flex-direction: column; padding: 15px 0; }
        .sidebar-menu a { display: flex; align-items: center; gap: 12px; padding: 14px 25px; color: #cbd5e1; text-decoration: none; }
        .sidebar-menu a:hover { background-color: #1e293b; color: #38bdf8; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9998; }
        .overlay.show { display: block; }
        .main-container { max-width: 1200px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .card { background-color: #0f111a; border: 1px solid #1e293b; padding: 25px; border-radius: 12px; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #1e293b; background: #08090c; color: #white; font-size: 15px; box-sizing: border-box; }
        button { background: #38bdf8; color: #08090c; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #0284c7; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-left-box">
            <div class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></div>
            <div class="brand">EASY SMS PANEL</div>
        </div>
        <div class="nav-right-box">
            {% if session.get('logged_in') %}
                <div class="user-balance-badge">৳{{ "%.2f"|format(global_balance) }}</div>
            {% endif %}
        </div>
    </div>
    <div class="overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebarMenu">
        <div class="sidebar-header">
            <div class="brand">EASY SMS PANEL</div>
            <div class="close-sidebar" onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></div>
        </div>
        <div class="sidebar-menu">
            {% if session.get('logged_in') %}
                <a href="/dashboard"><i class="fa-solid fa-gauge"></i> Dashboard</a>
                <a href="/get_number_page"><i class="fa-solid fa-mobile-screen"></i> Get Number</a>
                <a href="/console_page"><i class="fa-solid fa-terminal"></i> Live Console</a>
                <a href="/withdraw_page" style="color: #22c55e;"><i class="fa-solid fa-wallet"></i> Withdraw 💸</a>
                <a href="/logout" style="color: #ff4757;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            {% else %}
                <a href="/login"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
            {% endif %}
        </div>
    </div>
    <div class="main-container">
        {% block content %}{% endblock %}
    </div>
    <script>
        function toggleSidebar() {
            document.getElementById("sidebarMenu").classList.toggle("open");
            document.getElementById("sidebarOverlay").classList.toggle("show");
        }
    </script>
</body>
</html>
