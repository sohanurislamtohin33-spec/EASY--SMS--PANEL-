<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fast SMS Pro{% endblock %}</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; margin: 0; color: #e2e8f0; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 15px 20px; border-bottom: 1px solid #334155; }
        .navbar h2 { margin: 0; color: #3b82f6; font-size: 20px; }
        .nav-links a { color: #cbd5e1; text-decoration: none; margin-left: 15px; font-weight: 500; font-size: 14px; }
        .nav-links a:hover { color: #3b82f6; }
        .nav-links .logout { color: #f87171; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #3b82f6; font-size: 16px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #334155; padding-bottom: 8px; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 15px; box-sizing: border-box; }
        button { background: #10b981; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #059669; }
        .error { color: #f87171; background: #451a1a; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; border: 1px solid #7f1d1d; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>⚡ Fast SMS Pro</h2>
        <div class="nav-links">
            {% if session.get('username') %}
                {% if session.get('is_admin') %}
                    <a href="/admin">Admin Panel</a>
                {% else %}
                    <a href="/dashboard">Dashboard</a>
                    <a href="/get_number">Get Number</a>
                    <a href="/console">Console</a>
                    <a href="/withdraw_page">Withdraw</a>
                {% endif %}
                <a href="/logout" class="logout">Logout</a>
            {% endif %}
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
