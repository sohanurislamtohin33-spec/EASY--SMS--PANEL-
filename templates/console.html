{% include 'base.html' %}

{% block title %}Live Console - EASY SMS PANEL{% endblock %}

<style>
    .console-box { max-width: 650px; margin: 30px auto; background-color: #0f111a; border: 1px solid #1e293b; border-radius: 12px; overflow: hidden; padding: 10px; }
    .console-header { background-color: #131622; padding: 15px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; border-radius: 8px 8px 0 0; }
    .console-title { font-size: 16px; font-weight: bold; color: #38bdf8; display: flex; align-items: center; gap: 8px; }
    .live-dot { width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; animation: blink 1.2s infinite; }
    @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    .logs-container { padding: 15px; display: flex; flex-direction: column; gap: 10px; max-height: 75vh; overflow-y: auto; }
    .log-row { background-color: #161925; border: 1px solid #1e2235; border-radius: 8px; padding: 12px 15px; }
    .log-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .log-number { font-family: monospace; font-size: 15px; font-weight: bold; color: #f8fafc; }
    
    /* ওটিপি মেসেজ বক্সটিকে ক্লিকেবল ও আকর্ষণীয় করা হয়েছে */
    .log-msg { font-size: 13.5px; color: #94a3b8; background-color: #0b0c13; padding: 10px 12px; border-radius: 6px; border-left: 3px solid #38bdf8; word-break: break-all; cursor: pointer; transition: background 0.2s; position: relative; }
    .log-msg:hover { background-color: #1e293b; color: #fff; }
</style>

<div class="console-box">
    <div class="console-header">
        <div class="console-title"><div class="live-dot"></div><span>Global Network Live Stream</span></div>
        <span style="font-size: 11px; color: #64748b;">ক্লিক করে কপি করুন ⚡</span>
    </div>
    <div class="logs-container" id="logs-list">
        <div id="loading-status" style="text-align: center; color: #475569; padding: 40px;">কানেক্ট হচ্ছে...</div>
    </div>
</div>

<script>
    function fetchLiveConsole() {
        fetch('/api/console_stream')
        .then(res => res.json())
        .then(resData => {
            const list = document.getElementById('logs-list');
            
            if (resData.status === "success" && resData.data) {
                if (resData.data.length === 0) {
                    list.innerHTML = '<div style="text-align: center; color: #475569; padding: 40px;">এই মুহূর্তে কোনো লাইভ ডেটা নেই।</div>';
                    return;
                }

                // ফ্লিকারিং বা ইন্টারফেসের ঝিলিক মারা বন্ধ করতে পুরো স্ট্রিং একসাথে বিল্ড করা হচ্ছে
                let updatedContent = '';
                resData.data.forEach(otp => {
                    updatedContent += `
                        <div class="log-row">
                            <div class="log-meta">
                                <span class="log-number">${otp.range || 'PRIVATE'}</span>
                                <span style="color: #38bdf8; font-size: 12px; font-weight:bold;">${otp.service || 'SMS'}</span>
                            </div>
                            <div class="log-msg" onclick="copyConsoleMessage(this)" title="কপি করতে ক্লিক করুন">${otp.message}</div>
                            <div style="font-size:10px; color:#475569; text-align:right; margin-top:4px;">Country: ${otp.country || 'N/A'}</div>
                        </div>
                    `;
                });
                
                list.innerHTML = updatedContent;
            }
        })
        .catch(err => {
            console.error("Console Stream Error:", err);
            document.getElementById('logs-list').innerHTML = '<div style="text-align: center; color: #ef4444; padding: 40px;">সার্ভার কানেকশন ত্রুটি!</div>';
        });
    }

    // কনসোলের টেক্সট কপিয়ার ও ইনস্ট্যান্ট নোটিফিকেশন লজিক
    function copyConsoleMessage(element) {
        const text = element.innerText;
        navigator.clipboard.writeText(text).then(() => {
            let toast = document.createElement("div");
            toast.innerText = "মেসেজ কপি হয়েছে! ✅";
            toast.style.position = "fixed";
            toast.style.bottom = "30px";
            toast.style.left = "50%";
            toast.style.transform = "translateX(-50%)";
            toast.style.backgroundColor = "#38bdf8";
            toast.style.color = "#0f111a";
            toast.style.padding = "10px 20px";
            toast.style.borderRadius = "20px";
            toast.style.fontSize = "13px";
            toast.style.fontWeight = "bold";
            toast.style.zIndex = "99999";
            
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1000);
        }).catch(err => console.error("Copy failed", err));
    }

    // ৪ সেকেন্ডের পরিবর্তে রিয়েল-টাইম ফিল দিতে ৩ সেকেন্ড পর পর রিকোয়েস্ট করবে
    setInterval(fetchLiveConsole, 3000);
    fetchLiveConsole();
</script>
