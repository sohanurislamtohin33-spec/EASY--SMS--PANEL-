{% extends 'base.html' %}
{% block title %}Live OTP Console{% endblock %}
{% block content %}
<div class="card">
    <h3>📟 Live OTP Console</h3>
    <div id="num-display" style="font-size: 22px; font-weight: bold; color: #fbbf24; margin-bottom: 12px; display:none;"></div>
    <div id="log-screen" style="background: #000; color: #10b981; font-family: 'Courier New', monospace; padding: 15px; border-radius: 8px; min-height: 120px; font-size: 14px; border: 1px solid #334155; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);">
        No active number found. Please go to "Get Number" first.
    </div>
</div>

<script>
    let activeNum = localStorage.getItem('active_num');
    let pollInterval = null;

    if(activeNum) {
        document.getElementById('num-display').innerText = "📍 Active Number: " + activeNum;
        document.getElementById('num-display').style.display = "block";
        document.getElementById('log-screen').innerText = "⏳ Waiting for incoming SMS/OTP (5 min session)...";
        pollInterval = setInterval(pollOTP, 2000);
    }

    async function pollOTP() {
        if(!activeNum) return;
        const res = await fetch('/api/check_otp', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ number: activeNum })
        });
        const data = await res.json();

        if(data.status === 'success' && data.data.length > 0) {
            document.getElementById('log-screen').innerHTML = `<span style='color:#6ee7b7; font-size:18px;'>🟢 <b>OTP Received:</b> ${data.data[0].otp}</span>`;
            clearInterval(pollInterval);
            localStorage.removeItem('active_num');
            activeNum = "";
        } else if(data.status === 'expired') {
            document.getElementById('log-screen').innerText = "❌ Session Expired or Number Timed Out.";
            clearInterval(pollInterval);
            localStorage.removeItem('active_num');
            activeNum = "";
        }
    }
</script>
{% endblock %}
